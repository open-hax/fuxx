name: cljs

on:
  push:
    branches: [main, 'ci/**', 'feat/**', 'fix/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: shadow-cljs compile
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install JS deps
        run: npm install

      - name: Cache Clojure deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.cpcache
          key: clj-${{ hashFiles('deps.edn', 'shadow-cljs.edn') }}
          restore-keys: clj-

      - name: Compile CLJS (release)
        run: npx shadow-cljs compile app
