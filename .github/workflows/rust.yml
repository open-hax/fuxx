name: rust

on:
  push:
    branches: [main, 'ci/**', 'feat/**', 'fix/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: cargo check + test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install WebKitGTK system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            fuxx-host/target
          key: cargo-${{ hashFiles('fuxx-host/Cargo.toml') }}
          restore-keys: cargo-

      - name: cargo fmt
        working-directory: fuxx-host
        run: cargo fmt --check

      - name: cargo clippy
        working-directory: fuxx-host
        run: cargo clippy -- -D warnings

      - name: cargo test
        working-directory: fuxx-host
        run: cargo test
