name: contracts

on:
  push:
    branches: [main, 'ci/**', 'feat/**', 'fix/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: EDN contract lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: npm install

      - name: Cache Clojure deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.cpcache
          key: clj-${{ hashFiles('deps.edn') }}
          restore-keys: clj-

      - name: Check contracts dir exists
        run: |
          if [ -d contracts ]; then
            echo "contracts dir found"
          else
            echo "no contracts dir yet, skipping"
          fi
